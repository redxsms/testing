name: Delete RDP User
on:
  workflow_dispatch:
    inputs:
      username:
        description: 'RDP Username to delete'
        required: true

jobs:
  delete:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Delete User
        shell: bash
        run: |
          USERNAME=${{ github.event.inputs.username }}
          
          # ১. ইউজারের সব চলমান প্রসেস এবং RDP সেশন বন্ধ করা (যাতে সাথে সাথে কিক হয়)
          pkill -u $USERNAME || true
          
          # ২. ভার্চুয়াল ডিস্ক আনমাউন্ট করা
          umount /home/$USERNAME || true
          
          # ৩. ইউজার ও তার ফাইল ডিলিট করা
          userdel -r $USERNAME || true
          rm -f /vps_storage/$USERNAME.img
          
          echo "User $USERNAME deleted successfully."
