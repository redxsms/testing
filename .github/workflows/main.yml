name: VPS Unlimited RDP
on: [workflow_dispatch]

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 9999999
    steps:
      - name: Setup Unlimited RDP
        shell: bash
        run: |
          # ১. ইউজার তৈরি ও র‍্যান্ডম পাসওয়ার্ড সেট করা
          id -u rdp &>/dev/null || useradd -m rdp
          PASS=$(openssl rand -hex 8)
          echo "rdp:$PASS" | chpasswd
          
          # ২. xrdp সার্ভিস রিস্টার্ট করা (ব্যর্থ হলেও স্কিপ করবে)
          systemctl enable xrdp || true
          systemctl restart xrdp || true

          # ৩. সরাসরি VPS এর পাবলিক আইপি বের করা (ngrok এর কোনো দরকার নেই)
          IP=$(curl -s ifconfig.me || curl -s api.ipify.org)
          
          # ৪. বট যেন ঠিক এই লাইনগুলো পড়ে নিতে পারে
          echo "========================================"
          echo "Address: $IP"
          echo "Username: rdp"
          echo "Password: $PASS"
          echo "========================================"
          
          # অনন্তকালের জন্য চালু রাখা
          while true; do
            sleep 300
          done
