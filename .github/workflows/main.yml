name: VPS Unlimited RDP
on: [workflow_dispatch]

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Setup Unlimited RDP
        shell: bash
        run: |
          # ১. প্রতিবার নতুন একটি ইউজারনেম তৈরি করা (যেমন: rdp123)
          USERNAME="rdp$(shuf -i 100-999 -n 1)"
          id -u $USERNAME &>/dev/null || useradd -m $USERNAME
          PASS=$(openssl rand -hex 8)
          echo "$USERNAME:$PASS" | chpasswd
          
          # ২. xrdp সার্ভিস চালু করা (এটি সারাজীবন ব্যাকগ্রাউন্ডে চলবে)
          systemctl enable xrdp || true
          systemctl restart xrdp || true

          # ৩. VPS এর পাবলিক আইপি বের করা
          IP=$(curl -s ifconfig.me || curl -s api.ipify.org)
          
          # ৪. বট যেন ঠিক এই লাইনগুলো পড়ে নিতে পারে
          echo "========================================"
          echo "Address: $IP"
          echo "Username: $USERNAME"
          echo "Password: $PASS"
          echo "========================================"
          
          # এখানে while true দেওয়া হয়নি, তাই অ্যাকশন শেষ হবে এবং RDP সারাজীবন চলবে
