name: VPS Unlimited RDP
on: [workflow_dispatch]

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 9999999
    steps:
      - name: Setup Unlimited RDP
        shell: bash
        run: |
          # ১. ইউজার তৈরি ও র‍্যান্ডম পাসওয়ার্ড সেট করা
          id -u rdp &>/dev/null || useradd -m rdp
          PASS=$(openssl rand -hex 8)
          echo "rdp:$PASS" | chpasswd
          
          # ২. xrdp সার্ভিস রিস্টার্ট করা (ব্যর্থ হলেও স্কিপ করবে)
          systemctl enable xrdp || true
          systemctl restart xrdp || true

          # ৩. আগের থাকা ngrok থাকলে মেরে ফেলা (ব্যর্থ হলেও স্কিপ করবে)
          pkill ngrok || true
          sleep 2

          # ৪. ngrok কে ব্যাকগ্রাউন্ডে চালু করা
          nohup ngrok tcp 3389 --log=stdout > /tmp/ngrok.log &

          # ৫. আইপি বের করার জন্য ৫ সেকেন্ড অপেক্ষা করা
          sleep 5
          IP=$(grep -oE 'tcp://[0-9.a-z-]+:[0-9]+' /tmp/ngrok.log | head -1 | sed 's/tcp:\/\///')
          
          # ৬. বট যেন ঠিক এই লাইনগুলো পড়ে নিতে পারে
          echo "========================================"
          echo "Address: $IP"
          echo "Username: rdp"
          echo "Password: $PASS"
          echo "========================================"
          
          # অনন্তকালের জন্য চালু রাখা
          while true; do
            sleep 300
          done
