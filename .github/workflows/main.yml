name: Windows Unlimited RDP Test
on: [workflow_dispatch]

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 9999999
    steps:
      - name: Setup RDP & Keep Alive
        shell: pwsh
        run: |
          # ১. র‍্যান্ডম ইউজার ও পাসওয়ার্ড তৈরি
          $USERNAME = "rdp$(Get-Random -Minimum 100 -Maximum 999)"
          $PASS = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 10 | % {[char]$_})
          net user $USERNAME $PASS /add
          net localgroup Administrators $USERNAME /add
          net localgroup "Remote Desktop Users" $USERNAME /add
          
          # ২. RDP এবং ফায়ারওয়াল চালু করা
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # ৩. পাবলিক আইপি বের করা
          $IP = (Invoke-WebRequest -uri "http://ifconfig.me/ip").Content.Trim()
          
          # ৪. বট যেন প্রথমবার লগ থেকে পড়ে নিতে পারে
          Write-Host "========================================"
          Write-Host "Address: $IP"
          Write-Host "Username: $USERNAME"
          Write-Host "Password: $PASS"
          Write-Host "========================================"
          
          # ৫. Keep Alive (অ্যাকশন চালু রাখা, কোনো বাইপাস লুপ নেই)
          while ($true) {
            Write-Host "[$(Get-Date)] Windows RDP is Active..."
            Start-Sleep -Seconds 300
          }
        env:
          GH_TOKEN: ${{ github.token }}
