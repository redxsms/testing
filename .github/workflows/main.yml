name: VPS Windows Style RDP
on: [workflow_dispatch]

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Setup RDP
        shell: bash
        run: |
          USERNAME="rdp$(shuf -i 100-999 -n 1)"
          PASS=$(openssl rand -hex 8)
          
          # ৫ জিবি স্টোরেজ তৈরি
          mkdir -p /vps_storage
          dd if=/dev/zero of=/vps_storage/$USERNAME.img bs=1M count=5120
          mkfs.ext4 -F /vps_storage/$USERNAME.img
          mkdir -p /home/$USERNAME
          mount -o loop /vps_storage/$USERNAME.img /home/$USERNAME
          
          # ইউজার তৈরি
          useradd -d /home/$USERNAME -m $USERNAME
          echo "$USERNAME:$PASS" | chpasswd
          
          # ডেস্কটপ সেটআপ
          echo "startxfce4" > /home/$USERNAME/.xsession
          chmod +x /home/$USERNAME/.xsession
          chown $USERNAME:$USERNAME /home/$USERNAME/.xsession
          
          mkdir -p /home/$USERNAME/Desktop
          echo -e "=== Your RDP Specifications ===\nOS: Linux (Windows Style UI)\nCPU: 1 Core (Shared)\nRAM: ~1.2 GB (Shared)\nStorage: 5.0 GB (Allocated)\nBrowser: Firefox\nSoftware: VS Code, Python, Node.js" > /home/$USERNAME/Desktop/System_Info.txt
          chown -R $USERNAME:$USERNAME /home/$USERNAME/Desktop
          
          systemctl restart xrdp || true
          IP=$(curl -s ifconfig.me || curl -s api.ipify.org)
          
          echo "========================================"
          echo "Address: $IP"
          echo "Username: $USERNAME"
          echo "Password: $PASS"
          echo "========================================"
