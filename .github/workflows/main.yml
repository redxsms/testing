name: Windows RDP via Bore (Free)
on: [workflow_dispatch]

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 9999999
    steps:
      - name: Setup RDP & Bore
        shell: pwsh
        run: |
          # ১. র‍্যান্ডম ইউজার ও পাসওয়ার্ড তৈরি
          $USERNAME = "rdp$(Get-Random -Minimum 100 -Maximum 999)"
          $PASS = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 10 | % {[char]$_})
          net user $USERNAME $PASS /add
          net localgroup Administrators $USERNAME /add
          net localgroup "Remote Desktop Users" $USERNAME /add
          
          # ২. RDP চালু করা
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          
          # ৩. Bore ইনস্টল ও চালু করা (TCP টানেল)
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.exe" -OutFile "bore.exe"
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub"
          Start-Sleep -Seconds 10
          
          # ৪. লগ থেকে পোর্ট বের করা
          $PORT = (Select-String -Path "bore.log" -Pattern "listening at bore.pub:([0-9]+)" -AllMatches).Matches.Groups[1].Value
          $IP = "bore.pub:$PORT"
          
          # ৫. বট যেন পড়ে নিতে পারে
          Write-Host "========================================"
          Write-Host "Address: $IP"
          Write-Host "Username: $USERNAME"
          Write-Host "Password: $PASS"
          Write-Host "========================================"
          
          # ৬. Keep Alive
          while ($true) {
            Write-Host "[$(Get-Date)] Windows RDP is Active..."
            Start-Sleep -Seconds 300
          }
